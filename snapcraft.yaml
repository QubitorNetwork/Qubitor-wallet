name: quanta-wallet
title: Quanta Wallet
base: core24
version: "0.0.26"
summary: PQ-native Qubitor Network wallet
description: |
  Quanta Wallet is the desktop wallet for Qubitor Network. It creates and
  manages Quanta Accounts, shows live QBT balances, and signs Qubitor
  transactions with PQ-native account control.
license: Proprietary
website: https://docs.qubitor.org
contact: mailto:media@qubitor.org
source-code: https://github.com/QubitorNetwork/Qubitor-wallet
issues: https://github.com/QubitorNetwork/Qubitor-wallet/issues

grade: stable
confinement: strict

layout:
  /usr/libexec/webkit2gtk-4.1:
    symlink: $SNAP/usr/libexec/webkit2gtk-4.1
  /usr/lib/x86_64-linux-gnu/webkit2gtk-4.1:
    symlink: $SNAP/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1
  /usr/lib/aarch64-linux-gnu/webkit2gtk-4.1:
    symlink: $SNAP/usr/lib/aarch64-linux-gnu/webkit2gtk-4.1
  /usr/lib/webkit2gtk-4.1/injected-bundle:
    symlink: $SNAP/usr/lib/webkit2gtk-4.1/injected-bundle

apps:
  quanta-wallet:
    command: usr/bin/quanta-wallet-desktop
    desktop: usr/share/applications/quanta-wallet.desktop
    extensions: [gnome]
    plugs:
      - network
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - browser-support
      - gsettings
      - home

parts:
  quanta-wallet:
    plugin: dump
    source: .
    build-snaps:
      - node/20/stable
      - rustup/latest/stable
    build-packages:
      - build-essential
      - curl
      - dpkg
      - file
      - libayatana-appindicator3-dev
      - libdbus-1-dev
      - libssl-dev
      - libwebkit2gtk-4.1-dev
      - libxdo-dev
      - librsvg2-dev
      - pkg-config
      - wget
    stage-packages:
      - libayatana-appindicator3-1
      - libglu1-mesa
      - libsecret-1-0
      - libwebkit2gtk-4.1-0
    override-build: |
      set -eux
      export NPM_CONFIG_PREFIX="$HOME/.npm-global"
      mkdir -p "$NPM_CONFIG_PREFIX"
      export PATH="$NPM_CONFIG_PREFIX/bin:/snap/node/current/bin:/snap/rustup/current/bin:$HOME/.cargo/bin:$PATH"
      npm install -g pnpm@10.18.2
      rustup default stable
      pnpm install --frozen-lockfile
      pnpm --filter @qubitor/desktop tauri build --bundles deb
      dpkg -x apps/desktop/src-tauri/target/release/bundle/deb/*.deb "$SNAPCRAFT_PART_INSTALL/"
      desktop_dir="$SNAPCRAFT_PART_INSTALL/usr/share/applications"
      icon_dir="$SNAPCRAFT_PART_INSTALL/usr/share/pixmaps"
      mkdir -p "$desktop_dir"
      mkdir -p "$icon_dir"
      cp apps/desktop/src-tauri/icons/icon.png "$icon_dir/quanta-wallet.png"
      existing_desktop="$(find "$desktop_dir" -maxdepth 1 -type f -name "*.desktop" | head -n 1 || true)"
      if [ -n "$existing_desktop" ]; then
        cp "$existing_desktop" "$desktop_dir/quanta-wallet.desktop"
        sed -i -e "s|^Name=.*|Name=Quanta Wallet|" \
          -e "s|^Exec=.*|Exec=quanta-wallet|" \
          -e "s|^Icon=.*|Icon=quanta-wallet|" \
          "$desktop_dir/quanta-wallet.desktop"
      else
        cat > "$desktop_dir/quanta-wallet.desktop" <<'EOF'
      [Desktop Entry]
      Name=Quanta Wallet
      Comment=PQ-native Qubitor Network wallet
      Exec=quanta-wallet
      Icon=quanta-wallet
      Terminal=false
      Type=Application
      Categories=Finance;
      EOF
      fi
